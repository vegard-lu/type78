<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitt Bildegalleri</title>
    <style>
        body {
            text-align: center;
            font-family: sans-serif;
            padding: 40px 20px;
            background-color: #f5f5f7;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .galleri {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px; /* Avstand mellom ramme-boksene */
        }

        /* 1. RAMMEN: Denne bestemmer maks-størrelsen på bildene */
        .bilde-ramme {
            width: 100%;
            max-width: 600px;  /* Endre dette tallet for å gjøre "rammen" bredere/smalere */
            height: 450px;     /* Endre dette tallet for å gjøre "rammen" høyere/lavere */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* Hvit bakgrunn i rammen der bildet ikke dekker */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            padding: 10px; /* Litt luft mellom bildet og kanten av rammen */
            box-sizing: border-box;
        }

        /* 2. BILDET: Vises 100% uten å bli beskjært eller strukket */
        .bilde-ramme img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain; /* Sørger for at HELE bildet vises, uansett form */
            display: block;
        }

        /* Tilpasning for mindre mobilskjermer */
        @media (max-width: 600px) {
            .bilde-ramme {
                height: 350px;
            }
        }
    </style>
</head>
<body>

    <h1>Mitt Bildegalleri</h1>

    <div class="galleri">
        <div class="bilde-ramme"><img src="image.png" alt="Bilde 1"></div>
        <div class="bilde-ramme"><img src="image1.png" alt="Bilde 2"></div>
        <div class="bilde-ramme"><img src="image2.png" alt="Bilde 3"></div>
        <div class="bilde-ramme"><img src="image3.png" alt="Bilde 4"></div>
    </div>

</body>
</html>
