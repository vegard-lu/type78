<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type 78</title>
    <style>
        body {
            text-align: center;
            font-family: sans-serif;
            padding: 40px 20px;
            background-color: #f5f5f7;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        /* Container som holder bildene på plass */
        .galleri {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px; /* Avstand mellom bildene */
        }

        /* Sørger for at ALLE bildene blir nøyaktig like store */
        img {
            width: 500px;       /* Sett ønsket bredde her (f.eks. 100% på mobil, eller faste piksler) */
            height: 400px;      /* Sett ønsket høyde her */
            object-fit: cover;  /* KLIPP BILDE: Fyller ut boksen perfekt uten å bli strukket ut */
            
            /* Gjør det ser pent ut */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            display: block;
        }

        /* Gjør at bildene krymper pent hvis man ser på mobilen */
        @media (max-width: 550px) {
            img {
                width: 90%;
                height: 300px; /* Litt lavere høyde på mobilskjermer */
            }
        }
    </style>
</head>
<body>

    <h1>Type 78</h1>

    <div class="galleri">
        <img src="image.png" alt="Bilde 1">
        <img src="image1.png" alt="Bilde 2">
        <img src="image2.png" alt="Bilde 3">
        <img src="image3.png" alt="Bilde 4">
    </div>

</body>
</html>
