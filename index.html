<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitt Bildegalleri</title>
    <style>
        body {
            text-align: center;
            font-family: sans-serif;
            padding: 40px 20px;
            background-color: #f5f5f7;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        /* Denne boksen bestemmer nå størrelsen på HELE galleriet */
        .galleri {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px; /* Avstand mellom bildene */
            
            /* På Mac/PC blir galleriet maks 700 piksler bredt */
            max-width: 700px; 
            margin: 0 auto; /* Sentrerer galleriet på skjermen */
        }

        /* Nå tvinger vi ALLE bildene til å fylle hele bredden av galleriet */
        img {
            width: 100%;       /* Gjør at de små bildene tvinges til å strekke seg ut */
            height: auto;      /* Beholder de originale proporsjonene (ingen cropping/strekking i høyden) */
            display: block;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 6px;
        }

        /* Tilpasning for iPhone / mobil */
        @media (max-width: 768px) {
            .galleri {
                width: 95%; /* Bruker nesten hele skjermbredden på mobil */
            }
        }
    </style>
</head>
<body>

    <h1>Mitt Bildegalleri</h1>

    <div class="galleri">
        <img src="S5.png" alt="Bilde 1">
        <img src="s4mi2.png" alt="Bilde 2">
        <img src="s4mi2del2.png" alt="Bilde 3">
        <img src="S3mi2.png" alt="Bilde 4">
    </div>

</body>
</html>
